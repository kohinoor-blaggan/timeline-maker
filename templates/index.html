{% extends "base.html" %}

{% block content %}
<div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:1.5rem; flex-wrap:wrap; gap:.75rem">
  <h2 style="margin:0">Your Timelines</h2>
  <button onclick="toggleCreateForm()" id="create-btn">+ Create Timeline</button>
</div>

<div id="create-form" style="display:none; margin-bottom:1.5rem">
  <article style="margin:0; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.08); max-width:400px">
    <form method="POST" action="{{ url_for('create') }}">
      <label>
        Timeline name
        <input type="text" name="name" id="create-input" placeholder="e.g. World War II" required autofocus>
      </label>
      <div style="display:flex; gap:.5rem">
        <button type="submit" style="flex:1">Create</button>
        <button type="button" class="outline secondary" onclick="toggleCreateForm()">Cancel</button>
      </div>
    </form>
  </article>
</div>

{% if timelines %}
<div style="display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:1rem">
  {% for tl in timelines %}
  <article style="margin:0; border-radius:8px; box-shadow:0 2px 8px rgba(0,0,0,.08)">
    <header style="display:flex; justify-content:space-between; align-items:flex-start; gap:.5rem">
      <strong style="word-break:break-word">{{ tl.name }}</strong>
      <small style="color:#94a3b8; white-space:nowrap; flex-shrink:0">{{ tl.created_at[:10] }}</small>
    </header>
    <footer style="display:flex; justify-content:space-between; align-items:center">
      <a href="{{ url_for('timeline_editor', timeline_id=tl.id) }}" role="button" style="margin:0">Open →</a>
      <div style="display:flex; gap:.4rem">
        <button class="outline secondary" style="padding:.2rem .6rem; font-size:.82rem; margin:0"
                onclick="renameTimeline({{ tl.id }}, {{ tl.name | tojson }})">✎</button>
        <button class="outline" style="padding:.2rem .6rem; font-size:.82rem; margin:0; color:#ef4444; border-color:#fca5a5"
                onclick="deleteTimeline({{ tl.id }}, {{ tl.name | tojson }})">✕</button>
      </div>
    </footer>
  </article>
  {% endfor %}
</div>
{% else %}
<p style="color:#94a3b8; text-align:center; margin-top:3rem">No timelines yet — create one above.</p>
{% endif %}
{% endblock %}

{% block scripts %}
<script>
  function toggleCreateForm() {
    const form = document.getElementById('create-form');
    const visible = form.style.display !== 'none';
    form.style.display = visible ? 'none' : 'block';
    if (!visible) document.getElementById('create-input').focus();
  }

  async function renameTimeline(id, currentName) {
    const name = prompt('New name for this timeline:', currentName);
    if (!name || name.trim() === currentName) return;
    const res = await fetch(`/timeline/${id}/rename`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: name.trim() })
    });
    const data = await res.json();
    if (data.error) { alert(data.error); return; }
    location.reload();
  }

  async function deleteTimeline(id, name) {
    if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
    const res = await fetch(`/timeline/${id}`, { method: 'DELETE' });
    const data = await res.json();
    if (data.error) { alert(data.error); return; }
    location.reload();
  }
</script>
{% endblock %}
