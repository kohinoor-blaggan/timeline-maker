<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- 📅 as an inline SVG favicon — no asset file to ship or cache-bust -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📅</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <title>{% block title %}Timeline Maker{% endblock %}</title>
  <style>
    body > nav {
      border-bottom: 1px solid #e2e8f0;
    }
    nav strong a {
      text-decoration: none;
      color: inherit;
    }
    .flash {
      padding: .75rem 1rem;
      margin-bottom: 1rem;
      border-radius: var(--pico-border-radius);
      font-weight: 500;
      border: 1px solid;
    }
    .flash.success { background: #d1fae5; color: #065f46; border-color: #6ee7b7; }
    .flash.error   { background: #fee2e2; color: #991b1b; border-color: #fca5a5; }
    .badge {
      display: inline-block;
      padding: .15rem .6rem;
      background: #1d4ed8;
      color: #fff;
      border-radius: 999px;
      font-size: .72rem;
      font-weight: 600;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>
  <nav class="container-fluid">
    <ul>
      <li><strong><a href="{{ url_for('index') }}">📅 Timeline Maker</a></strong></li>
    </ul>
    <ul>
      <li><a href="{{ url_for('index') }}">Timelines</a></li>
    </ul>
  </nav>
  <main class="container" style="margin-top: 2rem">
    {% for category, message in get_flashed_messages(with_categories=true) %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
