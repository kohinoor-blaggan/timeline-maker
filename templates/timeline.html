{% extends "base.html" %}

{% block title %}{{ timeline.name }} — Timeline Maker{% endblock %}

{% block head %}
<style>
  /* Override container so timeline can go full width */
  body > main.container {
    max-width: 100% !important;
    padding: 0 !important;
    margin-top: 0 !important;
  }

  #editor-wrap {
    display: flex;
    height: calc(100vh - 57px);
    overflow: hidden;
  }

  /* Left: timeline canvas */
  #timeline-pane {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }

  #timeline-toolbar {
    padding: .5rem 1rem;
    border-bottom: 1px solid #e2e8f0;
    display: flex;
    align-items: center;
    gap: .75rem;
    background: #f8fafc;
    flex-wrap: wrap;
  }

  #tl-name {
    font-size: 1rem;
    font-weight: 700;
    color: #1e293b;
    margin-right: .25rem;
  }

  #vis-container {
    flex: 1;
    background: #f8fafc;
    overflow: hidden;
    position: relative;
  }

  /* Right: event form panel */
  #event-panel {
    width: 320px;
    border-left: 1px solid #e2e8f0;
    overflow-y: auto;
    background: #fff;
    padding: 1.25rem 1rem;
    display: none;
    flex-shrink: 0;
  }
  #event-panel.open { display: block; }

  .type-toggle {
    display: flex;
    gap: .4rem;
    margin-bottom: 1rem;
  }
  .type-btn {
    flex: 1;
    padding: .35rem;
    font-size: .82rem;
    border: 1px solid #cbd5e1;
    border-radius: 4px;
    background: #fff;
    cursor: pointer;
    color: #475569;
    font-weight: 500;
    transition: background .12s, color .12s;
  }
  .type-btn.active {
    background: #1d4ed8;
    color: #fff;
    border-color: #1d4ed8;
  }

  .panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }

  .color-preview {
    display: inline-block;
    width: 18px;
    height: 18px;
    border-radius: 4px;
    border: 1px solid #e2e8f0;
    vertical-align: middle;
    margin-right: .3rem;
  }

  /* Toolbar button styles */
  .toolbar-btn {
    font-size: .78rem;
    padding: .2rem .6rem;
    margin: 0;
    border-radius: 4px;
  }

  /* Event info bubble */
  #event-info-bubble {
    display: none;
    position: absolute;
    width: 260px;
    background: #fff;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    box-shadow: 0 6px 24px rgba(0,0,0,.13);
    z-index: 100;
    transform: translate(-50%, -50%);
    pointer-events: auto;
  }
  .bubble-accent {
    height: 4px;
    border-radius: 7px 7px 0 0;
  }
  .bubble-body {
    padding: .9rem 1rem .8rem;
  }
  .bubble-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: .5rem;
    margin-bottom: .4rem;
  }
  .bubble-title {
    font-size: .95rem;
    font-weight: 700;
    color: #1e293b;
    line-height: 1.3;
    flex: 1;
  }
  .bubble-close {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1rem;
    color: #94a3b8;
    padding: 0;
    line-height: 1;
    flex-shrink: 0;
  }
  .bubble-close:hover { color: #475569; }
  .bubble-date {
    font-size: .78rem;
    color: #64748b;
    font-weight: 500;
    margin-bottom: .6rem;
  }
  .bubble-desc {
    font-size: .83rem;
    color: #334155;
    line-height: 1.5;
    white-space: pre-wrap;
    margin-bottom: .7rem;
    max-height: 120px;
    overflow-y: auto;
  }
  .bubble-desc:empty { display: none; margin-bottom: 0; }
  .bubble-footer {
    display: flex;
    justify-content: flex-end;
    gap: .4rem;
    border-top: 1px solid #f1f5f9;
    padding-top: .6rem;
  }
</style>
{% endblock %}

{% block content %}
<div id="editor-wrap">
  <!-- Left: timeline -->
  <div id="timeline-pane">
    <div id="timeline-toolbar">
      <span id="tl-name">{{ timeline.name }}</span>
      <button class="outline secondary toolbar-btn" onclick="startRename()">✎ Rename</button>
      <span style="flex:1"></span>
      <button onclick="openAddPanel()" style="margin:0; padding:.3rem .9rem; font-size:.85rem; border-radius:4px">+ Add Event</button>
      <button class="outline toolbar-btn" style="color:#ef4444; border-color:#fca5a5" onclick="deleteThisTimeline()">🗑 Delete</button>
    </div>
    <div id="vis-container">
      <!-- Event info bubble (positioned by JS) -->
      <div id="event-info-bubble">
        <div class="bubble-accent" id="bubble-accent"></div>
        <div class="bubble-body">
          <div class="bubble-header">
            <span class="bubble-title" id="info-title"></span>
            <button class="bubble-close" onclick="closeInfoBubble()" title="Close">✕</button>
          </div>
          <div class="bubble-date" id="info-date"></div>
          <div class="bubble-desc" id="info-desc"></div>
          <div class="bubble-footer">
            <button class="outline" onclick="closeInfoBubble()" style="font-size:.78rem;padding:.2rem .6rem;border-radius:4px;margin:0">Close</button>
            <button onclick="openEditFromBubble()" style="font-size:.78rem;padding:.2rem .6rem;border-radius:4px;margin:0">Edit</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Right: event form panel -->
  <div id="event-panel">
    <div class="panel-header">
      <strong id="panel-title" style="color:#1e293b">Add Event</strong>
      <button onclick="closePanel()" style="background:none;border:none;cursor:pointer;font-size:1.1rem;color:#94a3b8;padding:.1rem .3rem;border-radius:4px" title="Close">✕</button>
    </div>

    <div class="type-toggle">
      <button class="type-btn active" id="btn-point" onclick="setEventType('point')">Point</button>
      <button class="type-btn" id="btn-period" onclick="setEventType('period')">Period</button>
    </div>

    <label style="display:block; margin-bottom:.75rem">
      <span style="font-size:.85rem; color:#475569; font-weight:600">Title</span>
      <input type="text" id="f-title" placeholder="Event title" style="margin-top:.25rem">
    </label>

    <label style="display:block; margin-bottom:.75rem">
      <span style="font-size:.85rem; color:#475569; font-weight:600">Description</span>
      <textarea id="f-desc" rows="3" placeholder="Optional description" style="margin-top:.25rem"></textarea>
    </label>

    <label style="display:block; margin-bottom:.75rem">
      <span style="font-size:.85rem; color:#475569; font-weight:600">Color</span>
      <div style="display:flex; align-items:center; gap:.5rem; margin-top:.25rem">
        <input type="color" id="f-color" value="#1d4ed8"
               style="width:2.5rem; height:2.5rem; padding:.1rem; border-radius:4px; border:1px solid #e2e8f0; cursor:pointer; flex-shrink:0">
        <span id="color-hex" style="font-size:.82rem; color:#64748b; font-family:monospace">#1d4ed8</span>
      </div>
    </label>

    <label style="display:block; margin-bottom:.75rem">
      <span style="font-size:.85rem; color:#475569; font-weight:600">Start Date</span>
      <input type="date" id="f-start" style="margin-top:.25rem">
    </label>

    <div id="end-date-row" style="display:none; margin-bottom:.75rem">
      <label style="display:block">
        <span style="font-size:.85rem; color:#475569; font-weight:600">End Date</span>
        <input type="date" id="f-end" style="margin-top:.25rem">
      </label>
    </div>

    <div id="panel-error" style="display:none; font-size:.82rem; color:#991b1b; margin-bottom:.75rem; background:#fee2e2; padding:.4rem .6rem; border-radius:4px; border:1px solid #fca5a5"></div>

    <div style="display:flex; gap:.5rem; margin-top:1rem">
      <button id="panel-save-btn" onclick="saveEvent()" style="flex:1; border-radius:4px">Save</button>
      <button id="panel-delete-btn" class="outline" onclick="deleteCurrentEvent()"
              style="color:#ef4444; border-color:#fca5a5; display:none; border-radius:4px">Delete</button>
    </div>
  </div>
</div>

<script>const TIMELINE_ID = {{ timeline.id }};</script>
<script src="{{ url_for('static', filename='app.js') }}"></script>
{% endblock %}
